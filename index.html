<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monaco Lua Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'JetBrains Mono', monospace;
      background: #000;
      color: #ff4444;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      background: #000;
      padding: 0 10px;
      border-bottom: 1px solid #300;
      align-items: center;
    }
    .tab-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      flex: 1;
    }
    .tab {
      display: flex;
      align-items: center;
      background: #111;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #ff4444;
      position: relative;
    }
    .tab:hover {
      background: #222;
    }
    .tab.active {
      background: #000;
      font-weight: bold;
    }
    .tab .icon {
      margin-right: 6px;
      width: 16px;
      height: 16px;
    }
    .tab .close {
      margin-left: 6px;
      cursor: pointer;
      color: #ff6666;
      font-size: 14px;
      transition: color 0.2s;
    }
    .tab .close:hover {
      color: #ff0000;
    }
    .add-tab {
      background: #111;
      border: 1px solid #300;
      border-radius: 6px;
      color: #ff4444;
      font-size: 16px;
      padding: 6px 12px;
      height: 32px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .add-tab:hover {
      background: #220000;
      color: #ff0000;
    }
    #editorWrapper {
      flex: 1;
      display: flex;
      background: linear-gradient(to bottom right, #000000, #330000);
    }
    #fileExplorer {
      width: 200px;
      background: #111;
      padding: 10px;
      border-right: 1px solid #300;
      color: #ff4444;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #fileExplorer button.script-btn {
      background: #000;
      border: 1px solid #300;
      color: #ff4444;
      padding: 8px;
      width: 100%;
      text-align: left;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    #fileExplorer button.script-btn:hover {
      background: #220000;
    }
    #editorContainer {
      flex: 1;
      position: relative;
    }
    .editor-view {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.25s ease, z-index 0.25s ease;
      z-index: 0;
    }
    .editor-view.active {
      opacity: 1;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="tab-bar" id="tabBar"></div>
    <button class="add-tab" id="addTab">＋</button>
  </div>
  <div id="editorWrapper">
    <div id="fileExplorer">
      <strong>Explorer</strong>
      <button class="script-btn" onclick="openScript('InfYield')">📜 InfYield</button>
      <button class="script-btn" onclick="openScript('Dex')">📜 Dex</button>
    </div>
    <div id="editorContainer"></div>
  </div>
  <script>
    let editors = {};
    let currentTabId = null;
    let tabCounter = 1;

    require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } });

    function createEditorView(id, code) {
      const container = document.createElement('div');
      container.className = 'editor-view';
      container.id = `editor-${id}`;
      document.getElementById('editorContainer').appendChild(container);

      const editor = monaco.editor.create(container, {
        value: code || '-- New tab\nprint("ROSE | v1")',
        language: 'lua',
        theme: 'vs-dark',
        automaticLayout: true
      });

      editors[id] = editor;
      return editor;
    }

    function createTabElement(id, name) {
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.dataset.id = id;
      tab.innerHTML = `<img class="icon" src="https://media.discordapp.net/attachments/1228784805458739340/1402545635567206450/New_Project_11_1.png?format=webp&quality=lossless&width=16&height=16" /> <span class="label">${name}</span>` + (id !== 'main' ? '<span class="close" onclick="closeTab(\'' + id + '\')">×</span>' : '');
      tab.onclick = () => activateTab(id);
      document.getElementById('tabBar').appendChild(tab);
    }

    function activateTab(id) {
      for (const eid in editors) {
        document.getElementById(`editor-${eid}`).classList.remove('active');
        const tabEl = document.querySelector(`.tab[data-id="${eid}"]`);
        if (tabEl) tabEl.classList.remove('active');
      }
      document.getElementById(`editor-${id}`).classList.add('active');
      const tabEl = document.querySelector(`.tab[data-id="${id}"]`);
      if (tabEl) tabEl.classList.add('active');
      currentTabId = id;
    }

    function closeTab(id) {
      if (id === 'main') return;
      document.getElementById(`editor-${id}`).remove();
      document.querySelector(`.tab[data-id="${id}"]`).remove();
      delete editors[id];
      activateTab('main');
    }

    function addTab(name, code) {
      const id = `tab${tabCounter++}`;
      const tabName = name || `Tab ${tabCounter - 1}`;
      createEditorView(id, code);
      createTabElement(id, tabName);
      activateTab(id);
    }

    function openScript(name) {
      const scripts = {
        InfYield: '-- InfYield Script\nprint("ROSE | v1 - InfYield")',
        Dex: '-- Dex Script\nprint("ROSE | v1 - Dex")'
      };
      addTab(name, scripts[name]);
    }

    document.getElementById('addTab').onclick = () => addTab();

    require(['vs/editor/editor.main'], () => {
      monaco.languages.register({ id: 'lua' });
      monaco.languages.setMonarchTokensProvider('lua', {
        tokenizer: {
          root: [
            [/[a-zA-Z_][\w]*/, {
              cases: {
                'function|if|then|else|elseif|end|for|in|do|while|repeat|until|return|local|break|and|or|not': 'keyword',
                '@default': 'identifier'
              }
            }],
            { include: '@whitespace' },
            [[/[{}()\[\]]/, '@brackets']],
            [[/[<>](=)?/, 'operator']],
            [/!=/, 'operator'],
            [/==/, 'operator'],
            [/--.*/, 'comment'],
            [/"([^"\\]|\\.)*$/, 'string.invalid'],
            [/"/, { token: 'string.quote', bracket: '@open', next: '@string' }],
          ],
          whitespace: [
            [/[ \t\r\n]+/, ''],
            [/--.*$/, 'comment'],
          ],
          string: [
            [/[^\\"]+/, 'string'],
            [/\\./, 'string.escape.invalid'],
            [/"/, { token: 'string.quote', bracket: '@close', next: '@pop' }]
          ]
        }
      });

      createEditorView('main', '-- Main tab\nprint("ROSE | v1")');
      createTabElement('main', 'Main');
      activateTab('main');
    });
  </script>
</body>
</html>
